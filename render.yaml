services:
  - type: web
    name: tasks-backend
    env: node
    plan: free
    region: oregon 
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npx prisma db push --accept-data-loss && npm run build
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: KIMI_API_KEY
        sync: false
      - key: NODE_ENV
        value: production
